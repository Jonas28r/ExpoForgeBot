name: Compilar APK de Expo Gratis Optimizado

on:
  workflow_dispatch: # Permite activar la compilación manualmente desde tu teléfono

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Da permiso para guardar el archivo nuevo

      - name: Configurar Node.js (Actualizado para SDK 54)
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Expo SDK 54 y React Native 0.81 exigen Node 20.

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Configuración de caché para acelerar futuras compilaciones
      - name: Configurar Caché de Dependencias
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/node_modules
          key: ${{ runner.os }}-expo-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      # Instalación inteligente y resolución de los asteriscos (*)
      - name: Instalar y corregir dependencias (Expo Fix)
        run: |
          npm install --legacy-peer-deps
          npx expo install --fix

      # SOLUCIÓN: Guardamos no solo el lock, sino también el package.json limpio
      - name: Guardar package.json actualizado en el repositorio
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add package.json package-lock.json
          (git commit -m "Auto-update dependencias [skip ci]" --no-verify && git push) || echo "No hay cambios pendientes por guardar o Git está limpio. Continuando..."

      # SOLUCIÓN CRÍTICA: La bandera --clean asegura que los plugins nativos se inyecten bien
      - name: Generar carpeta nativa de Android (Prebuild)
        run: npx expo prebuild --platform android --clean

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      # Compilación en MODO PRODUCCIÓN (Release) para empaquetar el código dentro del APK
      - name: Compilar APK (Modo Producción)
        run: |
          cd android
          ./gradlew assembleRelease -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

      # Guarda el APK y lo elimina automáticamente en 24 horas para no llenar tu cuenta
      - name: Guardar APK Final (Auto-limpieza en 24h)
        uses: actions/upload-artifact@v4
        with:
          name: Mi-App-Expo-APK-Release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 1
